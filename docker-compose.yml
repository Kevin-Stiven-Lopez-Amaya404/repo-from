version: "3.9"

# ────────────────────────────────────────────────────────────────────────────
# Red interna compartida por todos los servicios
# ────────────────────────────────────────────────────────────────────────────
networks:
  app-net:
    driver: bridge

# ────────────────────────────────────────────────────────────────────────────
# Volúmenes persistentes
# ────────────────────────────────────────────────────────────────────────────
volumes:
  postgres-data:

# ────────────────────────────────────────────────────────────────────────────
# Variables comunes reutilizables (ancla YAML)
# ────────────────────────────────────────────────────────────────────────────
x-db-env: &db-env
  POSTGRES_DB:       appdb
  POSTGRES_USER:     appuser
  POSTGRES_PASSWORD: apppassword

services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: app-postgres
    restart: unless-stopped
    environment:
      <<: *db-env
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"          # Solo exponer en desarrollo; quitar en producción
    networks:
      - app-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U appuser -d appdb"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ── Liquibase (migraciones) ─────────────────────────────────────────────────
  liquibase:
    image: liquibase/liquibase:4.26
    container_name: app-liquibase
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      --url=jdbc:postgresql://postgres:5432/appdb
      --username=appuser
      --password=apppassword
      --changeLogFile=db/changelog/db.changelog-master.xml
      --log-level=INFO
      update
    volumes:
      - ./db:/liquibase/db
    networks:
      - app-net
    # Liquibase finaliza tras aplicar las migraciones; restart: no es correcto
    restart: "no"

  # ── API Node.js ─────────────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: app-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      liquibase:
        condition: service_completed_successfully
    environment:
      NODE_ENV:    production
      PORT:        3000
      DB_HOST:     postgres
      DB_PORT:     5432
      DB_NAME:     appdb
      DB_USER:     appuser
      DB_PASSWORD: apppassword
      DB_POOL_MAX: 10
    ports:
      - "3000:3000"
    networks:
      - app-net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
