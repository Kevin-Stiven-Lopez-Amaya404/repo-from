name: CI/CD - Java Gradle Deploy

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: gradle

      - name: Dar permisos a gradlew
        run: chmod +x gradlew

      - name: Ver archivos (debug)
        run: ls -la

      - name: Build con Gradle
        run: |
          if [ -f gradlew ]; then
            ./gradlew build
          else
            echo "No existe gradlew"
            exit 1
          fi

      - name: Verificar JAR generado
        run: |
          if ls build/libs/*.jar 1> /dev/null 2>&1; then
            echo "JAR generado correctamente"
          else
            echo "No se generó el JAR"
            exit 1
          fi

      - name: Subir JAR
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: build/libs/*.jar
